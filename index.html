<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <!-- Failsafe wrapper to ensure window.fetch is writable and doesn't crash on standard reassignments -->
    <script>
      (function() {
        var originalFetch = window.fetch;
        var currentFetch = originalFetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return currentFetch; },
            set: function(val) { currentFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Unable to define writable fetch on window directly, trying prototype...", e);
          try {
            Object.defineProperty(Window.prototype, 'fetch', {
              get: function() { return currentFetch; },
              set: function(val) { currentFetch = val; },
              configurable: true,
              enumerable: true
            });
          } catch (ex) {
            console.error("Unable to define writable fetch on Window prototype", ex);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
